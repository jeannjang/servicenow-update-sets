name: Deploy Update Set to UAT

on:
  push:
    paths:
      - 'update_sets/**.xml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get changed XML files
        run: |
          git diff --name-only HEAD~1 HEAD | grep 'update_sets/.*\.xml' > changed_files.txt || true
          echo "=== Changed files ==="
          cat changed_files.txt
          echo "===================="

      - name: Deploy each Update Set XML to UAT
        env:
          SN_INSTANCE: ${{ secrets.UAT_SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.UAT_SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.UAT_SN_PASSWORD }}
        run: |
          if [ ! -s changed_files.txt ]; then
            echo "No XML files to deploy"
            exit 0
          fi

          while IFS= read -r file; do
            if [ -z "$file" ]; then continue; fi
            echo "=== Processing: $file ==="
            FILENAME=$(basename "$file")

            # GitHub raw URL 생성
            GITHUB_RAW_URL="https://raw.githubusercontent.com/jeannjang/servicenow-update-sets/main/${file}"
            echo "GitHub Raw URL: $GITHUB_RAW_URL"

            # 두 번째 PDI Scripted REST API 호출
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://${SN_INSTANCE}/api/1790158/update_set_importer/import" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -u "${SN_USERNAME}:${SN_PASSWORD}" \
              -d "{\"github_url\": \"${GITHUB_RAW_URL}\"}")

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)

            echo "Status: $HTTP_CODE"
            echo "Response: $BODY"

            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "Success: $FILENAME"
            else
              echo "Failed: $FILENAME"
              exit 1
            fi

          done < changed_files.txt

      - name: Summary
        run: |
          echo "Deployment to UAT complete!"
