name: Deploy Update Set to UAT

on:
  push:
    paths:
      - 'update_sets/**.xml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get changed XML files
        id: get_files
        run: |
          git diff --name-only HEAD~1 HEAD | grep 'update_sets/.*\.xml' > changed_files.txt || true
          echo "=== Changed files ==="
          cat changed_files.txt
          echo "===================="

      - name: Deploy each Update Set XML to UAT
        env:
          SN_INSTANCE: ${{ secrets.UAT_SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.UAT_SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.UAT_SN_PASSWORD }}
        run: |
          if [ ! -s changed_files.txt ]; then
            echo "No XML files to deploy"
            exit 0
          fi

          while IFS= read -r file; do
            if [ -z "$file" ]; then continue; fi
            echo "=== Processing: $file ==="

            # XML 파일을 raw 텍스트로 읽기
            XML_CONTENT=$(cat "$file")

            # ServiceNow Retrieved Update Sets에 import
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://${SN_INSTANCE}/api/now/table/sys_remote_update_set" \
              -H "Content-Type: application/xml" \
              -H "Accept: application/json" \
              -u "${SN_USERNAME}:${SN_PASSWORD}" \
              --data-binary "$XML_CONTENT")

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)

            echo "Status: $HTTP_CODE"
            echo "Response: $BODY"

            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "Success: $file"
            else
              echo "Failed: $file"
              exit 1
            fi

          done < changed_files.txt

      - name: Summary
        run: |
          echo "Deployment to UAT complete!"
