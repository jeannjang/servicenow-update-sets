name: Deploy Update Set to UAT

on:
  push:
    paths:
      - 'update_sets/**.xml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get pushed XML file
        id: get_file
        run: |
          # push된 파일 목록을 GitHub API로 가져오기
          echo "${{ github.event.commits[0].added }}" > added.txt
          echo "${{ github.event.commits[0].modified }}" >> added.txt
          cat added.txt

          # update_sets 폴더의 XML만 필터링
          grep 'update_sets/.*\.xml' added.txt > changed_files.txt || true
          echo "Changed files:"
          cat changed_files.txt

      - name: Deploy each Update Set XML to UAT
        env:
          SN_INSTANCE: ${{ secrets.UAT_SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.UAT_SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.UAT_SN_PASSWORD }}
        run: |
          while IFS= read -r file; do
            if [ -z "$file" ]; then continue; fi
            echo "Processing: $file"

            # XML 파일을 base64 인코딩
            CONTENT=$(base64 -w 0 "$file")
            FILENAME=$(basename "$file")

            # ServiceNow Retrieved Update Sets API로 전송
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://${SN_INSTANCE}/api/now/table/sys_remote_update_set" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -u "${SN_USERNAME}:${SN_PASSWORD}" \
              -d "{
                \"payload\": \"${CONTENT}\",
                \"name\": \"${FILENAME}\"
              }")

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)

            echo "File: $FILENAME | Status: $HTTP_CODE"
            echo "Response: $BODY"

            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "Successfully sent to UAT. Retrieved Update Sets: $FILENAME"
            else
              echo "Failed: $FILENAME"
              exit 1
            fi

          done < changed_files.txt

      - name: Summary
        run: |
          echo "🚀 Deployment to UAT complete!"
          echo "Instance: ${{ secrets.UAT_SN_INSTANCE }}"
